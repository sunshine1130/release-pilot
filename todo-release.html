<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>需求发版管理</title>
<style>
/* ===== Variables ===== */
:root {
  --bg: #f5f7fa;
  --bg-gradient: linear-gradient(180deg, #fafbfc 0%, #f0f2f5 100%);
  --surface: #ffffff;
  --surface-raised: #fafbfc;
  --surface-hover: #f8f9fc;
  --border: #e5e7eb;
  --border-light: #f0f1f3;
  --border-focus: #2563eb;
  --text: #1f2937;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --text-disabled: #d1d5db;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent-light: #dbeafe;
  --accent-bg: rgba(37,99,235,0.08);
  --accent-glow: rgba(37,99,235,0.15);
  --success: #10b981;
  --success-hover: #059669;
  --success-bg: rgba(16,185,129,0.08);
  --success-light: #d1fae5;
  --warning: #f59e0b;
  --warning-bg: rgba(245,158,11,0.08);
  --warning-light: #fef3c7;
  --danger: #ef4444;
  --danger-hover: #dc2626;
  --danger-bg: rgba(239,68,68,0.08);
  --danger-light: #fee2e2;
  --purple: #8b5cf6;
  --purple-bg: rgba(139,92,246,0.08);
  --purple-light: #ede9fe;
  --cyan: #06b6d4;
  --cyan-bg: rgba(6,182,212,0.08);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
  --shadow: 0 2px 6px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.03);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.06), 0 16px 40px rgba(0,0,0,0.04);
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
  --mono: 'SF Mono','JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --transition-fast: 0.15s cubic-bezier(0.4,0,0.2,1);
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --transition-slow: 0.3s cubic-bezier(0.4,0,0.2,1);
  --spacing-xs: 3px;
  --spacing-sm: 6px;
  --spacing-md: 12px;
  --spacing-lg: 18px;
  --spacing-xl: 24px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Roboto,sans-serif;
  background: var(--bg-gradient);
  background-attachment: fixed;
  padding: 0;
  min-height: 100vh;
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: var(--spacing-lg) var(--spacing-md) var(--spacing-lg);
}

/* ===== Header ===== */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--spacing-lg);
  flex-wrap: wrap;
  gap: var(--spacing-md);
}
.page-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
}
.page-title::before {
  content: '';
  width: 4px;
  height: 22px;
  background: linear-gradient(180deg, var(--accent) 0%, var(--purple) 100%);
  border-radius: 2px;
}
.page-title .sub {
  font-weight: 400;
  color: var(--text-muted);
  font-size: 13px;
  margin-left: 4px;
  padding: 2px 8px;
  background: var(--surface-raised);
  border-radius: 12px;
}
.header-actions {
  display: flex;
  gap: var(--spacing-sm);
  align-items: center;
}

/* ===== Search bar ===== */
.search-wrap {
  position: relative;
  flex-shrink: 0;
}
.search-wrap input {
  padding-left: 36px !important;
  width: 260px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  transition: all var(--transition);
  background: var(--surface);
}
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-wrap input::placeholder {
  color: var(--text-muted);
}
.search-wrap .search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 15px;
  pointer-events: none;
}
.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--surface-raised);
  border: 1px solid var(--border);
  cursor: pointer;
  color: var(--text-muted);
  font-size: 12px;
  padding: 3px 6px;
  border-radius: var(--radius-sm);
  display: none;
  transition: all var(--transition-fast);
}
.search-clear:hover {
  color: var(--text);
  background: var(--danger-bg);
  border-color: var(--danger);
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  border: none;
  border-radius: var(--radius);
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 550;
  cursor: pointer;
  transition: all var(--transition);
  line-height: 1.4;
  white-space: nowrap;
  outline: none;
  letter-spacing: 0.01em;
  position: relative;
  overflow: hidden;
}
.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%);
  pointer-events: none;
}
.btn:focus-visible {
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, #1d4ed8 100%);
  color: #fff;
  box-shadow: 0 2px 8px rgba(37,99,235,0.25);
}
.btn-primary:hover {
  background: linear-gradient(135deg, var(--accent-hover) 0%, #1e40af 100%);
  box-shadow: 0 4px 14px rgba(37,99,235,0.35);
  transform: translateY(-1px);
}
.btn-primary:active {
  transform: translateY(0);
  box-shadow: 0 2px 6px rgba(37,99,235,0.2);
}
.btn-outline {
  background: var(--surface);
  color: var(--text-secondary);
  border: 1.5px solid var(--border);
}
.btn-outline:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-bg);
  box-shadow: 0 0 0 2px var(--accent-glow);
}
.btn-outline.active {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}
.btn-success {
  background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
  color: #fff;
  box-shadow: 0 2px 8px rgba(16,185,129,0.25);
}
.btn-success:hover {
  background: linear-gradient(135deg, var(--success-hover) 0%, #047857 100%);
  box-shadow: 0 4px 14px rgba(16,185,129,0.35);
  transform: translateY(-1px);
}
.btn-danger {
  background: var(--surface);
  color: var(--danger);
  border: 1.5px solid var(--danger);
}
.btn-danger:hover {
  background: var(--danger);
  color: #fff;
  box-shadow: 0 2px 8px rgba(239,68,68,0.25);
}
.btn-warning {
  background: var(--surface);
  color: #f59e0b;
  border: 1.5px solid #f59e0b;
}
.btn-warning:hover {
  background: #f59e0b;
  color: #fff;
  box-shadow: 0 2px 8px rgba(245,158,11,0.25);
}
.btn-info {
  background: var(--surface);
  color: var(--accent);
  border: 1.5px solid var(--accent);
}
.btn-info:hover {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(37,99,235,0.25);
}
.btn-secondary {
  background: var(--surface);
  color: var(--text-muted);
  border: 1.5px solid var(--border);
}
.btn-secondary:hover {
  background: var(--surface-raised);
  color: var(--text);
  border-color: var(--text-muted);
}
.btn-ghost {
  background: none;
  color: var(--text-muted);
  border: none;
  padding: 4px 10px;
}
.btn-ghost:hover {
  color: var(--text);
  background: var(--surface-raised);
}
.btn-xs {
  padding: 2px 8px;
  font-size: 11px;
  border-radius: var(--radius-sm);
  font-weight: 550;
}
.btn-sm {
  padding: 5px 12px;
  font-size: 12px;
  border-radius: var(--radius-sm);
}

/* ===== Section ===== */
.section {
  margin-bottom: var(--spacing-lg);
}
.section-header {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  margin-bottom: var(--spacing-md);
}
.section-header .collapse-header {
  flex: 0 1 auto;
}
.section-header h2 {
  font-size: 14px;
  font-weight: 650;
  color: var(--text);
  letter-spacing: -0.01em;
}
.section-header .count {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 12px;
  transition: all var(--transition-fast);
}
.section-header .count:hover {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}
.section-header .count-pending {
  background: #fef3c7;
  color: #d97706;
  border-color: #f59e0b;
}
.section-header .count-pending:hover {
  background: #fde68a;
  color: #b45309;
}
.section-header .count-released {
  background: #d1fae5;
  color: #059669;
  border-color: #10b981;
}
.section-header .count-released:hover {
  background: #a7f3d0;
  color: #047857;
}

/* ===== Card ===== */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: all var(--transition);
}
.card:hover {
  box-shadow: var(--shadow);
}
.card-body {
  padding: var(--spacing-sm);
}
.card-body-flush {
  padding: 0;
}

/* ===== Table ===== */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  overflow: hidden;
}
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-variant-numeric: tabular-nums;
}
th, td {
  padding: 8px 12px;
  text-align: left;
  font-size: 13px;
  vertical-align: top;
}
th {
  background: linear-gradient(180deg, var(--surface-raised) 0%, var(--surface) 100%);
  font-weight: 600;
  color: var(--text-muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .05em;
  white-space: nowrap;
  padding-top: 10px;
  padding-bottom: 10px;
  position: relative;
}

td {
  word-break: break-word;
  border-bottom: 1px solid var(--border-light);
}
tr:last-child td {
  border-bottom: none;
}
tbody tr {
  transition: all var(--transition);
}
tbody tr:hover {
  background: var(--surface-hover);
  transform: scale(1.002);
}
tbody tr:hover td {
  background: transparent;
}
tr.edit-row {
  background: var(--accent-bg);
}
tr.edit-row td {
  background: var(--accent-bg) !important;
}
@keyframes rowIn {
  from {
    opacity: 0;
    transform: translateY(-8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
tr.row-fresh {
  animation: rowIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes highlight {
  0% {
    background: var(--success-light) !important;
  }
  100% {
    background: transparent;
  }
}
tr.row-highlight td {
  animation: highlight 1.4s ease-out;
}

/* ===== Inputs ===== */
input, select {
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 10px;
  font-size: 13px;
  outline: none;
  transition: all var(--transition);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
}
input::placeholder, select::placeholder {
  color: var(--text-muted);
}
input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
input:hover, select:hover {
  border-color: var(--text-muted);
}
input.inline-input {
  width: 100%;
  margin-bottom: 4px;
}

/* ===== Status tags ===== */
.status-tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 14px;
  font-size: 11px;
  font-weight: 600;
  margin: 0;
  letter-spacing: .01em;
  transition: all var(--transition-fast);
  cursor: default;
}
.status-tag:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.status-new {
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid rgba(37,99,235,0.2);
}
.status-pending {
  background: var(--warning-bg);
  color: var(--warning);
  border: 1px solid rgba(245,158,11,0.2);
}
.status-released {
  background: var(--success-bg);
  color: var(--success);
  border: 1px solid rgba(16,185,129,0.2);
}

/* ===== Links ===== */
.link {
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all var(--transition-fast);
  position: relative;
}
.link::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--accent);
  transition: width var(--transition);
}
.link:hover {
  color: var(--accent-hover);
}
.link:hover::after {
  width: 100%;
}

/* ===== Collapse ===== */
.collapse-header {
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  padding: 4px 0;
  border-radius: var(--radius-sm);
  transition: background var(--transition-fast);
}
.collapse-header:hover {
  background: var(--surface-raised);
}
.collapse-header .arrow {
  transition: transform var(--transition);
  display: inline-block;
  font-size: 10px;
  color: var(--text-muted);
  margin-right: 6px;
}
.collapse-header .arrow.open {
  transform: rotate(90deg);
}
.collapse-header h2 {
  margin-right: 10px;
}
.collapse-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height var(--transition-slow);
}
.collapse-body.expanded {
  max-height: 4000px;
}

/* ===== Tags ===== */
.project-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: var(--radius);
  font-size: 11px;
  font-weight: 550;
  transition: all var(--transition-fast);
}
.project-tag:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);

.project-tag.has-mr {

<script>
// ============= Data =============
let projectNames = []
let items = []
let addingItems = []
let addingCounter = 0
let editingIds = {}
let searchQuery = ''

const JSON_FILENAME = 'toDo.json'

function getFullData() { return { projectNames, items } }

function setFullData(data) {
  if (data && Array.isArray(data.projectNames)) projectNames = data.projectNames
  if (data && Array.isArray(data.items)) items = data.items
}

function saveToLocalStorage() {
  localStorage.setItem('todo_project_names', JSON.stringify(projectNames))
  localStorage.setItem('todo_release_data', JSON.stringify(items))
}

async function loadFromJsonFile() {
  try {
    const resp = await fetch('./' + JSON_FILENAME, { cache: 'no-store' })
    if (resp.ok) { const json = await resp.json(); setFullData(json); return true }
  } catch (e) {}
  return false
}

function exportToFile() {
  const now = new Date()
  const timestamp = now.getFullYear() +
    String(now.getMonth() + 1).padStart(2, '0') +
    String(now.getDate()).padStart(2, '0') + '-' +
    String(now.getHours()).padStart(2, '0') +
    String(now.getMinutes()).padStart(2, '0') +
    String(now.getSeconds()).padStart(2, '0')
  const filename = `todoList-发版需求-${timestamp}.json`
  const blob = new Blob([JSON.stringify(getFullData(), null, 2)], { type: 'application/json' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = filename
  a.click()
  URL.revokeObjectURL(a.href)
  toast(`已导出 ${filename}`)
}

function importFromFile(e) {
  const file = e.target.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result)
      setFullData(data)
      saveToLocalStorage()
      updateProjectDatalist()
      renderProjectMgr()
      render()
      toast('已导入 ' + items.length + ' 条需求')
    } catch (err) { toast('导入失败：JSON 格式错误') }
  }
  reader.readAsText(file)
  e.target.value = ''
}

// ============= Init =============
async function init() {
  const loaded = await loadFromJsonFile()
  if (!loaded) {
    try { projectNames = JSON.parse(localStorage.getItem('todo_project_names')) || [] } catch (e) { projectNames = [] }
    try { items = JSON.parse(localStorage.getItem('todo_release_data')) || [] } catch (e) { items = [] }
  }
  updateProjectDatalist()
  renderProjectMgr()
  render()
}

function updateProjectDatalist() {
  // 已改用自定义下拉框，此函数保留但不执行
}

// 自定义项目下拉框
function setupProjectDropdown(input) {
  let dropdown = null
  let selectedIndex = -1
  let isUserInput = false // 标记是否为用户输入

  const showDropdown = (filter = false) => {
    if (dropdown) return
    dropdown = document.createElement('div')
    dropdown.className = 'project-dropdown'
    
    const rect = input.getBoundingClientRect()
    dropdown.style.left = rect.left + 'px'
    dropdown.style.top = (rect.bottom + 2) + 'px'
    dropdown.style.width = rect.width + 'px'
    
    // 如果是用户输入则过滤，否则显示全部
    const filtered = filter 
      ? projectNames.filter(p => p.name.toLowerCase().includes(input.value.toLowerCase()))
      : projectNames
    
    if (filtered.length === 0) {
      dropdown.innerHTML = '<div class="project-dropdown-item" style="color:var(--text-muted)">无匹配项目</div>'
    } else {
      filtered.forEach((p, i) => {
        const item = document.createElement('div')
        item.className = 'project-dropdown-item'
        if (p.name === input.value) item.classList.add('selected')
        item.textContent = p.name
        item.onclick = () => {
          input.value = p.name
          isUserInput = false // 选择后重置标记
          hideDropdown()
          input.focus()
        }
        dropdown.appendChild(item)
      })
    }
    
    document.body.appendChild(dropdown)
  }

  const hideDropdown = () => {
    if (dropdown) {
      dropdown.remove()
      dropdown = null
    }
    selectedIndex = -1
  }

  const updateDropdown = () => {
    if (!dropdown) return
    const filtered = projectNames.filter(p => 
      p.name.toLowerCase().includes(input.value.toLowerCase())
    )
    
    dropdown.innerHTML = ''
    if (filtered.length === 0) {
      dropdown.innerHTML = '<div class="project-dropdown-item" style="color:var(--text-muted)">无匹配项目</div>'
    } else {
      filtered.forEach((p, i) => {
        const item = document.createElement('div')
        item.className = 'project-dropdown-item'
        if (i === selectedIndex) item.classList.add('selected')
        item.textContent = p.name
        item.onclick = () => {
          input.value = p.name
          isUserInput = false
          hideDropdown()
          input.focus()
        }
        dropdown.appendChild(item)
      })
    }
  }

  // focus时显示全部项目（不过滤）
  input.addEventListener('focus', () => {
    // 先关闭已有的下拉框（防止 blur 的 setTimeout 还没执行完）
    if (dropdown) {
      dropdown.remove()
      dropdown = null
    }
    isUserInput = false
    showDropdown(false)
  })
  
  // click时也显示下拉框（解决 focus 后再次点击不触发 focus 事件的问题）
  input.addEventListener('click', () => {
    if (!dropdown) {
      isUserInput = false
      showDropdown(false)
    }
  })
  
  // 用户输入时才过滤
  input.addEventListener('input', () => {
    isUserInput = true
    selectedIndex = -1
    if (!dropdown) showDropdown(true)
    else {
      const rect = input.getBoundingClientRect()
      dropdown.style.left = rect.left + 'px'
      dropdown.style.top = (rect.bottom + 2) + 'px'
      dropdown.style.width = rect.width + 'px'
    }
    updateDropdown()
  })
  
  input.addEventListener('keydown', (e) => {
    if (!dropdown) return
    const items = dropdown.querySelectorAll('.project-dropdown-item')
    const count = items.length
    
    if (e.key === 'ArrowDown') {
      e.preventDefault()
      selectedIndex = Math.min(selectedIndex + 1, count - 1)
      updateDropdown()
    } else if (e.key === 'ArrowUp') {
      e.preventDefault()
      selectedIndex = Math.max(selectedIndex - 1, 0)
      updateDropdown()
    } else if (e.key === 'Enter' && selectedIndex >= 0) {
      e.preventDefault()
      const filtered = isUserInput 
        ? projectNames.filter(p => p.name.toLowerCase().includes(input.value.toLowerCase()))
        : projectNames
      if (filtered[selectedIndex]) {
        input.value = filtered[selectedIndex].name
        isUserInput = false
        hideDropdown()
      }
    } else if (e.key === 'Escape') {
      hideDropdown()
    }
  })

  input.addEventListener('blur', () => {
    setTimeout(hideDropdown, 150)
  })
}

function getProjectInfo(name) { return projectNames.find(p => p.name === name) }

function getProjectColorIndex(name) {
  let hash = 0
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash)
  }
  return Math.abs(hash) % 30
}

// ============= Search =============
function onSearch() {
  const inp = document.getElementById('searchInput')
  const clearBtn = document.getElementById('searchClear')
  searchQuery = inp.value.trim().toLowerCase()
  clearBtn.style.display = searchQuery ? 'block' : 'none'
  render()
}

function clearSearch() {
  document.getElementById('searchInput').value = ''
  searchQuery = ''
  document.getElementById('searchClear').style.display = 'none'
  render()
}

function filterItems(arr) {
  if (!searchQuery) return arr
  return arr.filter(i => {
    const nameMatch = i.name.toLowerCase().includes(searchQuery)
    const linkMatch = i.link && i.link.toLowerCase().includes(searchQuery)
    // 搜索项目分支名
    const branchMatch = (i.projects && i.projects.some(p => p.branch && p.branch.toLowerCase().includes(searchQuery)))
    // 搜索一同发版分支名
    const syncBranchMatch = (i.syncBranches && i.syncBranches.some(sb => sb.branch && sb.branch.toLowerCase().includes(searchQuery)))
    return nameMatch || linkMatch || branchMatch || syncBranchMatch
  })
}

// ============= Toast =============
let toastTimer
function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => el.classList.remove('show'), 1600)
}

// ============= Project Manager =============
function toggleProjectMgr() {
  const body = document.getElementById('pmBody')
  const arrow = document.getElementById('pmArrow')
  if (body.classList.contains('expanded')) {
    body.classList.remove('expanded'); arrow.classList.remove('open')
  } else {
    body.classList.add('expanded'); arrow.classList.add('open')
  }
}

let editingProjectIdx = -1

function renderProjectMgr() {
  if (editingProjectIdx >= 0 && editingProjectIdx < projectNames.length) {
    const p = projectNames[editingProjectIdx]
    document.getElementById('pmTagList').innerHTML = `
      <div class="edit-row">
        <input id="pmEditName" value="${escHtml(p.name)}" placeholder="项目名称" style="width:150px">
        <input id="pmEditMr" value="${escHtml(p.mr || '')}" placeholder="MR 地址（可选）" style="width:260px">
        <button class="btn btn-success btn-sm" onclick="saveProjectEdit()">保存</button>
        <button class="btn btn-outline btn-sm" onclick="cancelProjectEdit()">取消</button>
      </div>
    `
  } else {
    document.getElementById('pmTagList').innerHTML = projectNames
      .map((p, i) => {
        const colorIdx = getProjectColorIndex(p.name)
        return `<span class="tag-item"><span class="proj-name project-tag${p.mr ? ' has-mr' : ''}" data-color="${colorIdx}">${escHtml(p.name)}</span>${p.mr ? `<a class="mr-link" href="${escHtml(p.mr)}" target="_blank">MR</a>` : ''}<button class="edit-btn" title="编辑项目" onclick="editProject(${i})">✏️</button><button class="del" title="删除项目" onclick="removeProjectName(${i})">×</button></span>`
      }).join('')
  }
}

function editProject(i) {
  editingProjectIdx = i
  renderProjectMgr()
}

function cancelProjectEdit() {
  editingProjectIdx = -1
  renderProjectMgr()
}

function saveProjectEdit() {
  const nameInput = document.getElementById('pmEditName')
  const mrInput = document.getElementById('pmEditMr')
  const newName = nameInput.value.trim()
  const newMr = mrInput.value.trim()
  if (!newName) { nameInput.focus(); return }
  const oldName = projectNames[editingProjectIdx].name
  if (newName !== oldName && projectNames.some(p => p.name === newName)) {
    toast('项目名称已存在'); nameInput.focus(); return
  }
  projectNames[editingProjectIdx] = { name: newName, mr: newMr || '' }
  editingProjectIdx = -1
  updateProjectDatalist(); renderProjectMgr(); saveToLocalStorage()
  toast('已更新 ' + newName)
}

function addProjectName() {
  const input = document.getElementById('pmNewName')
  const mrInput = document.getElementById('pmNewMr')
  const name = input.value.trim()
  const mr = mrInput.value.trim()
  if (!name) return
  if (projectNames.some(p => p.name === name)) { input.value = ''; return }
  projectNames.push({ name, mr: mr || '' })
  input.value = ''; mrInput.value = ''
  updateProjectDatalist(); renderProjectMgr(); saveToLocalStorage()
  toast('已添加 ' + name)
}

function removeProjectName(i) {
  const name = projectNames[i].name
  projectNames.splice(i, 1)
  if (editingProjectIdx === i) editingProjectIdx = -1
  else if (editingProjectIdx > i) editingProjectIdx--
  updateProjectDatalist(); renderProjectMgr(); saveToLocalStorage()
  toast('已移除 ' + name)
}

// ============= Utilities =============
function escHtml(str) {
  if (!str) return ''
  const div = document.createElement('div')
  div.textContent = str
  return div.innerHTML
}

function truncateUrl(url) {
  if (!url) return ''
  return url.length > 32 ? url.substring(0, 32) + '...' : url
}

function formatReleaseTime(date) {
  const y = date.getFullYear()
  const m = String(date.getMonth() + 1).padStart(2, '0')
  const d = String(date.getDate()).padStart(2, '0')
  const h = String(date.getHours()).padStart(2, '0')
  const min = String(date.getMinutes()).padStart(2, '0')
  const s = String(date.getSeconds()).padStart(2, '0')
  return `${y}-${m}-${d} ${h}:${min}:${s}`
}

function copyText(text) {
  if (!text) return Promise.resolve()
  return navigator.clipboard.writeText(text)
    .then(() => toast('\u2713 ' + text))
    .catch(() => {
      const ta = document.createElement('textarea')
      ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px'
      document.body.appendChild(ta); ta.select()
      document.execCommand('copy'); document.body.removeChild(ta)
      toast('\u2713 ' + text)
    })
}

// ============= Render =============
function render() {
  const pending = filterItems(items.filter(i => i.status === 'pending' || i.status === 'new'))
  const released = filterItems(items.filter(i => i.status === 'released'))

  document.getElementById('pendingCount').textContent = pending.length || '0'
  document.getElementById('releasedCount').textContent = released.length || '0'

  // 默认展开待发版
  const pendingBody = document.getElementById('pendingBody')
  const pendingArrow = document.getElementById('pendingArrow')
  if (!pendingBody.classList.contains('expanded')) {
    pendingBody.classList.add('expanded')
    pendingArrow.classList.add('open')
  }

  const pTbody = document.getElementById('pendingTbody')
  const rTbody = document.getElementById('releasedTbody')
  pTbody.innerHTML = ''; rTbody.innerHTML = ''

  addingItems.forEach(ai => {
    const tr = createEditRow(ai, true)
    tr.classList.add('edit-row')
    pTbody.appendChild(tr)
  })

  const pEmpty = document.getElementById('pendingEmpty')
  if (pending.length === 0 && addingItems.length === 0) {
    pEmpty.style.display = 'block'
  } else {
    pEmpty.style.display = 'none'
    pending.forEach((item, idx) => {
      const isNew = item._justAdded
      if (isNew) delete item._justAdded
      if (editingIds[item.id]) pTbody.appendChild(createEditRow(item, false))
      else pTbody.appendChild(createDisplayRow(item, isNew))
    })
  }

  const rEmpty = document.getElementById('releasedEmpty')
  if (released.length === 0) {
    rEmpty.style.display = 'block'
  } else {
    rEmpty.style.display = 'none'
    released.forEach(item => {
      if (editingIds[item.id]) rTbody.appendChild(createEditRow(item, false))
      else rTbody.appendChild(createDisplayRow(item, false))
    })
  }

  updateTotalCount()
}

function updateTotalCount() {
  document.getElementById('totalCount').textContent = '共 ' + items.length + ' 条'
}

  tdStatus.innerHTML = item.status === 'new'

    : item.status === 'pending'
    ? '<span class="status-tag status-pending">待发版</span>'
    : '<span class="status-tag status-released">已发版</span>'
  tr.appendChild(tdStatus)

  const tdLink = document.createElement('td')

  // Sync branches

  const syncContainer = document.createElement('div')

  const addSyncRow = (proj, branch) => {
    const row = document.createElement('div'); row.className = 'pair-row'
    row.innerHTML = `<input placeholder="项目名" size="10" data-role="syncProjectName" value="${escHtml(proj||'')}" autocomplete="off"><input placeholder="分支名" size="14" data-role="syncBranchName" value="${escHtml(branch||'')}"><button class="btn btn-danger btn-xs">&times;</button>`
    row.querySelector('button').onclick = () => row.remove()
    // 添加项目下拉功能
    const projInput = row.querySelector('[data-role="syncProjectName"]')
    setupProjectDropdown(projInput)
    syncContainer.appendChild(row)
  }

  <button class="btn btn-secondary btn-xs" data-action="cancel">取消</button>`
  tdAction.addEventListener('click', e => handleAction(e, item.id))
  tr.appendChild(tdAction)
  return tr
}

// ============= Collect =============
function collectEditRowData(itemId) {
  const pairs = document.getElementById('pairs-' + itemId)
  const tr = pairs ? pairs.closest('tr') : document.querySelector('tr.edit-row')
  if (!tr) return null

  const name = (tr.querySelector('[data-field=name]')?.value || '').trim()
  const link = (tr.querySelector('[data-field=link]')?.value || '').trim()

  const projects = []
  const pc = document.getElementById('pairs-' + itemId)
  if (pc) pc.querySelectorAll('.pair-row').forEach(row => {
    const n = (row.querySelector('[data-role=projectName]')?.value || '').trim()
    const b = (row.querySelector('[data-role=projectBranch]')?.value || '').trim()
    if (n) projects.push({ name: n, branch: b })
  })

  const syncBranches = []
  tr.querySelectorAll('[data-role=syncProjectName]').forEach(projInp => {
    const row = projInp.closest('.pair-row')
    const branchInp = row ? row.querySelector('[data-role=syncBranchName]') : null
    const p = projInp.value.trim()
    const b = branchInp ? branchInp.value.trim() : ''
    if (b) syncBranches.push({ project: p, branch: b })
  })

  return { name, link, projects, syncBranches }
}

// ============= Actions =============
function handleAction(e, itemId) {
  const btn = e.target.closest('button')
  if (!btn) return
  const action = btn.dataset.action
  e.stopPropagation()

  switch (action) {
    case 'edit': editingIds[itemId] = true; render(); break
    case 'save': {
      const data = collectEditRowData(itemId)
      if (!data || !data.name) { toast('请输入需求名称'); return }
      if (itemId.startsWith('__add_')) {
        const newItem = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          name: data.name, link: data.link, status: 'new',
          projects: data.projects, syncBranches: data.syncBranches,
          _justAdded: true
        }
        items.unshift(newItem)
        addingItems = addingItems.filter(a => a.id !== itemId)
      } else {
        const item = items.find(i => i.id === itemId)
        if (item) Object.assign(item, { name: data.name, link: data.link, projects: data.projects, syncBranches: data.syncBranches })
        delete editingIds[itemId]
        toast('已保存')
      }
      saveToLocalStorage(); render(); break
    }
    case 'cancel':
      if (itemId.startsWith('__add_')) addingItems = addingItems.filter(a => a.id !== itemId)
      else delete editingIds[itemId]
      render(); break
    case 'release': {
      const item = items.find(i => i.id === itemId)
      if (item) {
        item.status = 'released'
        item.releaseTime = formatReleaseTime(new Date())
        toast('\u2713 已发版：' + item.name)
      }
      saveToLocalStorage(); render(); break
    }
    case 'markPending': {
      const item = items.find(i => i.id === itemId)
      if (item) { item.status = 'pending'; toast('已设为待发版：' + item.name) }
      saveToLocalStorage(); render(); break
    }
    case 'revertNew': {
      const item = items.find(i => i.id === itemId)
      if (item) { item.status = 'new'; toast('已回退新建：' + item.name) }
      saveToLocalStorage(); render(); break
    }
    case 'unrelease': {
      const item = items.find(i => i.id === itemId)
      if (item) { item.status = 'pending'; delete item.releaseTime; toast('已恢复待发版：' + item.name) }
      saveToLocalStorage(); render(); break
    }
    case 'delete': showConfirm(itemId); break
  }
}

function startAdding() {
  addingItems.push({
    id: '__add_' + addingCounter++, name: '', link: '',
    status: 'new', projects: [], syncBranches: []
  })
  render()
}

function releaseAll() {
  const pending = items.filter(i => i.status === 'pending')
  if (pending.length === 0) { toast('没有待发版的需求'); return }
  const releaseTime = formatReleaseTime(new Date())
  pending.forEach(i => { i.status = 'released'; i.releaseTime = releaseTime })
  saveToLocalStorage(); render()
  toast('已全部标记为已发版（' + pending.length + ' 条）')
}

// ============= Confirm =============
let pendingDeleteId = null

function showConfirm(id) {
  pendingDeleteId = id
  const item = items.find(i => i.id === id)
  document.getElementById('confirmMsg').textContent = item ? '需求：' + item.name : ''
  document.getElementById('confirmOverlay').style.display = 'flex'
}

function closeConfirm() {
  pendingDeleteId = null
  document.getElementById('confirmOverlay').style.display = 'none'
}

document.getElementById('confirmOkBtn').onclick = () => {
  if (!pendingDeleteId) return
  const item = items.find(i => i.id === pendingDeleteId)
  const name = item ? item.name : ''
  items = items.filter(i => i.id !== pendingDeleteId)
  saveToLocalStorage(); closeConfirm(); render()
  toast('已删除：' + name)
}

document.getElementById('confirmOverlay').onclick = e => {
  if (e.target === document.getElementById('confirmOverlay')) closeConfirm()
}

// ============= Collapse =============
function togglePending() {
  const body = document.getElementById('pendingBody')
  const arrow = document.getElementById('pendingArrow')
  if (body.classList.contains('expanded')) {
    body.classList.remove('expanded'); arrow.classList.remove('open')
  } else {
    body.classList.add('expanded'); arrow.classList.add('open')
  }
}

function toggleReleased() {
  const body = document.getElementById('releasedBody')
  const arrow = document.getElementById('releasedArrow')
  if (body.classList.contains('expanded')) {
    body.classList.remove('expanded'); arrow.classList.remove('open')
  } else {
    body.classList.add('expanded'); arrow.classList.add('open')
  }
}

// ============= Keyboard =============
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); startAdding() }
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault()
    document.getElementById('searchInput').focus()
  }
  if (e.key === 'Escape') {
    if (document.getElementById('confirmOverlay').style.display === 'flex') closeConfirm()
    if (searchQuery) clearSearch()
  }
})

// ============= Daily reminder =============
function getTodayStr() {
  const d = new Date()
  return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate()
}

function checkDailyReminder() {
  const lastDate = localStorage.getItem('todo_last_remind_date')
  if (lastDate !== getTodayStr()) {
    document.getElementById('reminderOverlay').classList.add('show')
  }
}

function dismissReminder() {
  document.getElementById('reminderOverlay').classList.remove('show')
  localStorage.setItem('todo_last_remind_date', getTodayStr())
}

function exportAndDismiss() {
  exportToFile()
  dismissReminder()
}

// Start
init()
checkDailyReminder()
</script>
