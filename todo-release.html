<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>需求发版管理</title>
<style>
/* ===== Variables ===== */
:root {
  --bg: #f5f7fa;
  --bg-gradient: linear-gradient(180deg, #fafbfc 0%, #f0f2f5 100%);
  --surface: #ffffff;
  --surface-raised: #fafbfc;
  --surface-hover: #f8f9fc;
  --border: #e5e7eb;
  --border-light: #f0f1f3;
  --border-focus: #2563eb;
  --text: #1f2937;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --text-disabled: #d1d5db;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent-light: #dbeafe;
  --accent-bg: rgba(37,99,235,0.08);
  --accent-glow: rgba(37,99,235,0.15);
  --success: #10b981;
  --success-hover: #059669;
  --success-bg: rgba(16,185,129,0.08);
  --success-light: #d1fae5;
  --warning: #f59e0b;
  --warning-bg: rgba(245,158,11,0.08);
  --warning-light: #fef3c7;
  --danger: #ef4444;
  --danger-hover: #dc2626;
  --danger-bg: rgba(239,68,68,0.08);
  --danger-light: #fee2e2;
  --purple: #8b5cf6;
  --purple-bg: rgba(139,92,246,0.08);
  --purple-light: #ede9fe;
  --cyan: #06b6d4;
  --cyan-bg: rgba(6,182,212,0.08);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
  --shadow: 0 2px 6px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.03);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.06), 0 16px 40px rgba(0,0,0,0.04);
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
  --mono: 'SF Mono','JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --transition-fast: 0.15s cubic-bezier(0.4,0,0.2,1);
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --transition-slow: 0.3s cubic-bezier(0.4,0,0.2,1);
  --spacing-xs: 3px;
  --spacing-sm: 6px;
  --spacing-md: 12px;
  --spacing-lg: 18px;
  --spacing-xl: 24px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Roboto,sans-serif;
  background: var(--bg-gradient);
  background-attachment: fixed;
  padding: 0;
  min-height: 100vh;
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: var(--spacing-lg) var(--spacing-md) var(--spacing-lg);
}

/* ===== Header ===== */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--spacing-lg);
  flex-wrap: wrap;
  gap: var(--spacing-md);
}
.page-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
}
.page-title::before {
  content: '';
  width: 4px;
  height: 22px;
  background: linear-gradient(180deg, var(--accent) 0%, var(--purple) 100%);
  border-radius: 2px;
}
.page-title .sub {
  font-weight: 400;
  color: var(--text-muted);
  font-size: 13px;
  margin-left: 4px;
  padding: 2px 8px;
  background: var(--surface-raised);
  border-radius: 12px;
}
.header-actions {
  display: flex;
  gap: var(--spacing-sm);
  align-items: center;
}

/* ===== Search bar ===== */
.search-wrap {
  position: relative;
  flex-shrink: 0;
}
.help-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--text-muted);
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 700;
  text-decoration: none;
  transition: all var(--transition-fast);
  flex-shrink: 0;
}
.help-icon:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.search-wrap input {
  padding-left: 36px !important;
  width: 260px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  transition: all var(--transition);
  background: var(--surface);
}
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-wrap input::placeholder {
  color: var(--text-muted);
}
.search-wrap .search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 15px;
  pointer-events: none;
}
.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--surface-raised);
  border: 1px solid var(--border);
  cursor: pointer;
  color: var(--text-muted);
  font-size: 12px;
  padding: 3px 6px;
  border-radius: var(--radius-sm);
  display: none;
  transition: all var(--transition-fast);
}
.search-clear:hover {
  color: var(--text);
  background: var(--danger-bg);
  border-color: var(--danger);
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  border: none;
  border-radius: var(--radius);
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 550;
  cursor: pointer;
  transition: all var(--transition);
  line-height: 1.4;
  white-space: nowrap;
  outline: none;
  letter-spacing: 0.01em;
  position: relative;
  overflow: hidden;
}
.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%);
  pointer-events: none;
}
.btn:focus-visible {
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, #1d4ed8 100%);
  color: #fff;
  box-shadow: 0 2px 8px rgba(37,99,235,0.25);
}
.btn-primary:hover {
  background: linear-gradient(135deg, var(--accent-hover) 0%, #1e40af 100%);
  box-shadow: 0 4px 14px rgba(37,99,235,0.35);
  transform: translateY(-1px);
}
.btn-primary:active {
  transform: translateY(0);
  box-shadow: 0 2px 6px rgba(37,99,235,0.2);
}
.btn-outline {
  background: var(--surface);
  color: var(--text-secondary);
  border: 1.5px solid var(--border);
}
.btn-outline:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-bg);
  box-shadow: 0 0 0 2px var(--accent-glow);
}
.btn-outline.active {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}
.btn-success {
  background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
  color: #fff;
  box-shadow: 0 2px 8px rgba(16,185,129,0.25);
}
.btn-success:hover {
  background: linear-gradient(135deg, var(--success-hover) 0%, #047857 100%);
  box-shadow: 0 4px 14px rgba(16,185,129,0.35);
  transform: translateY(-1px);
}
.btn-danger {
  background: var(--surface);
  color: var(--danger);
  border: 1.5px solid var(--danger);
}
.btn-danger:hover {
  background: var(--danger);
  color: #fff;
  box-shadow: 0 2px 8px rgba(239,68,68,0.25);
}
.btn-warning {
  background: var(--surface);
  color: #f59e0b;
  border: 1.5px solid #f59e0b;
}
.btn-warning:hover {
  background: #f59e0b;
  color: #fff;
  box-shadow: 0 2px 8px rgba(245,158,11,0.25);
}
.btn-info {
  background: var(--surface);
  color: var(--accent);
  border: 1.5px solid var(--accent);
}
.btn-info:hover {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(37,99,235,0.25);
}
.btn-secondary {
  background: var(--surface);
  color: var(--text-muted);
  border: 1.5px solid var(--border);
}
.btn-secondary:hover {
  background: var(--surface-raised);
  color: var(--text);
  border-color: var(--text-muted);
}
.btn-purple {
  background: var(--purple);
  color: #fff;
  border: 1.5px solid var(--purple);
}
.btn-purple:hover {
  background: #7c3aed;
  border-color: #7c3aed;
  box-shadow: 0 2px 8px rgba(139,92,246,0.25);
}
.btn-ghost {
  background: none;
  color: var(--text-muted);
  border: none;
  padding: 4px 10px;
}
.btn-ghost:hover {
  color: var(--text);
  background: var(--surface-raised);
}
.btn-xs {
  padding: 2px 8px;
  font-size: 11px;
  border-radius: var(--radius-sm);
  font-weight: 550;
}
.btn-sm {
  padding: 5px 12px;
  font-size: 12px;
  border-radius: var(--radius-sm);
}

/* ===== Section ===== */
.section {
  margin-bottom: var(--spacing-lg);
}
.section-header {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  margin-bottom: var(--spacing-md);
}
.section-header .collapse-header {
  flex: 0 1 auto;
}
.section-header h2 {
  font-size: 14px;
  font-weight: 650;
  color: var(--text);
  letter-spacing: -0.01em;
}
.section-header .count {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 12px;
  transition: all var(--transition-fast);
}
.section-header .count:hover {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}
.section-header .count-pending {
  background: #fef3c7;
  color: #d97706;
  border-color: #f59e0b;
}
.section-header .count-pending:hover {
  background: #fde68a;
  color: #b45309;
}
.section-header .count-releasing {
  background: #ede9fe;
  color: #7c3aed;
  border-color: #8b5cf6;
}
.section-header .count-releasing:hover {
  background: #ddd6fe;
  color: #6d28d9;
}
.section-header .count-released {
  background: #d1fae5;
  color: #059669;
  border-color: #10b981;
}
.section-header .count-released:hover {
  background: #a7f3d0;
  color: #047857;
}

/* ===== Card ===== */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: all var(--transition);
}
.card:hover {
  box-shadow: var(--shadow);
}
.card-body {
  padding: var(--spacing-sm);
}
.card-body-flush {
  padding: 0;
}

/* ===== Table ===== */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  overflow: hidden;
}
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-variant-numeric: tabular-nums;
}
th, td {
  padding: 8px 12px;
  text-align: left;
  font-size: 13px;
  vertical-align: top;
}
th {
  background: linear-gradient(180deg, var(--surface-raised) 0%, var(--surface) 100%);
  font-weight: 600;
  color: var(--text-muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .05em;
  white-space: nowrap;
  padding-top: 10px;
  padding-bottom: 10px;
  position: relative;
}

td {
  word-break: break-word;
  border-bottom: 1px solid var(--border-light);
}
tr:last-child td {
  border-bottom: none;
}
tbody tr {
  transition: all var(--transition);
}
tbody tr:hover {
  background: var(--surface-hover);
  transform: scale(1.002);
}
tbody tr:hover td {
  background: transparent;
}
tr.edit-row {
  background: var(--accent-bg);
}
tr.edit-row td {
  background: var(--accent-bg) !important;
}
@keyframes rowIn {
  from {
    opacity: 0;
    transform: translateY(-8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
tr.row-fresh {
  animation: rowIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes highlight {
  0% {
    background: var(--success-light) !important;
  }
  100% {
    background: transparent;
  }
}
tr.row-highlight td {
  animation: highlight 1.4s ease-out;
}

/* ===== Inputs ===== */
input, select {
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 10px;
  font-size: 13px;
  outline: none;
  transition: all var(--transition);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
}
input::placeholder, select::placeholder {
  color: var(--text-muted);
}
input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
input:hover, select:hover {
  border-color: var(--text-muted);
}
input.inline-input {
  width: 100%;
  margin-bottom: 4px;
}

/* ===== Status tags ===== */
.status-tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 14px;
  font-size: 11px;
  font-weight: 600;
  margin: 0;
  letter-spacing: .01em;
  white-space: nowrap;
  transition: all var(--transition-fast);
  cursor: default;
}
.status-tag:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.status-new {
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid rgba(37,99,235,0.2);
}
.status-pending {
  background: var(--warning-bg);
  color: var(--warning);
  border: 1px solid rgba(245,158,11,0.2);
}
.status-releasing {
  background: var(--purple-bg);
  color: var(--purple);
  border: 1px solid rgba(139,92,246,0.2);
}
.status-released {
  background: var(--success-bg);
  color: var(--success);
  border: 1px solid rgba(16,185,129,0.2);
}

/* ===== Links ===== */
.link {
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all var(--transition-fast);
  position: relative;
}
.link::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--accent);
  transition: width var(--transition);
}
.link:hover {
  color: var(--accent-hover);
}
.link:hover::after {
  width: 100%;
}

/* ===== Collapse ===== */
.collapse-header {
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  padding: 4px 0;
  border-radius: var(--radius-sm);
  transition: background var(--transition-fast);
}
.collapse-header:hover {
  background: var(--surface-raised);
}
.collapse-header .arrow {
  transition: transform var(--transition);
  display: inline-block;
  font-size: 10px;
  color: var(--text-muted);
  margin-right: 6px;
}
.collapse-header .arrow.open {
  transform: rotate(90deg);
}
.collapse-header h2 {
  margin-right: 10px;
}
.collapse-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height var(--transition-slow);
}
.collapse-body.expanded {
  max-height: 4000px;
}

/* ===== Tags ===== */
.project-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: var(--radius);
  font-size: 11px;
  font-weight: 550;
  transition: all var(--transition-fast);
}
.project-tag:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.project-tag.has-mr {
  border: 2px solid currentColor;
  font-weight: 600;
}

        导入 <input type="file" accept=".json" style="display:none" onchange="importFromFile(event)" />

            onkeydown="if(event.key==='Enter')addProjectName()" />

            onkeydown="if(event.key==='Enter')addProjectName()" />

            onkeydown="if(event.key==='Enter')addProjectName()" />

<script>
// ============= Config =============
const API_PORT = 1949
// ============= Data =============
let projectNames = []
let items = []
let addingItems = []
let addingCounter = 0
let editingIds = {}
let searchQuery = ''
let launchBranch = ''  // 全项目上线目标分支名
let branchesCache = {}  // { projectName: { branches: [...], timestamp: ... } }

function saveLaunchBranch() {
  localStorage.setItem('todo_launch_branch', launchBranch)
}
function loadLaunchBranch() {
  launchBranch = localStorage.getItem('todo_launch_branch') || ''
}

function saveBranchCache() {
  // 保存前清除 origin/ 开头的分支
  for (const key of Object.keys(branchesCache)) {
    if (branchesCache[key].branches) {
      branchesCache[key].branches = branchesCache[key].branches.filter(b => b.branch && b.branch !== 'origin' && !b.branch.startsWith('origin/'))
    }
  }
  localStorage.setItem('todo_branch_cache', JSON.stringify(branchesCache))
}

function loadBranchCache() {
  try {
    branchesCache = JSON.parse(localStorage.getItem('todo_branch_cache')) || {}
  } catch (e) { branchesCache = {} }
}

const JSON_FILENAME = 'toDo.json'

function getFullData() { return { projectNames, items, branchesCache, launchBranch } }

function setFullData(data) {
  if (data && Array.isArray(data.projectNames)) projectNames = data.projectNames
  if (data && Array.isArray(data.items)) items = data.items
  if (data && data.branchesCache && typeof data.branchesCache === 'object') branchesCache = data.branchesCache
  if (data && typeof data.launchBranch === 'string') launchBranch = data.launchBranch
}

function saveToLocalStorage() {
  localStorage.setItem('todo_project_names', JSON.stringify(projectNames))
  localStorage.setItem('todo_release_data', JSON.stringify(items))
}

async function loadFromJsonFile() {
  try {
    const resp = await fetch('./' + JSON_FILENAME, { cache: 'no-store' })
    if (resp.ok) { const json = await resp.json(); setFullData(json); return true }
  } catch (e) {}
  return false
}

function exportToFile() {
  const now = new Date()
  const timestamp = now.getFullYear() +
    String(now.getMonth() + 1).padStart(2, '0') +
    String(now.getDate()).padStart(2, '0') + '-' +
    String(now.getHours()).padStart(2, '0') +
    String(now.getMinutes()).padStart(2, '0') +
    String(now.getSeconds()).padStart(2, '0')
  const filename = `todoList-发版需求-${timestamp}.json`
  const blob = new Blob([JSON.stringify(getFullData(), null, 2)], { type: 'application/json' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = filename
  a.click()
  URL.revokeObjectURL(a.href)
  toast(`已导出 ${filename}`)
}

function importFromFile(e) {
  const file = e.target.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result)
      setFullData(data)
      saveToLocalStorage()
      saveBranchCache()
      saveLaunchBranch()
      document.getElementById('pmLaunchBranch').value = launchBranch
      editingIds = {}; addingItems = []; addingCounter = 0
      updateProjectDatalist()
      renderProjectMgr()
      render()
      toast('已导入 ' + items.length + ' 条需求')
    } catch (err) { toast('导入失败：JSON 格式错误') }
  }
  reader.readAsText(file)
  e.target.value = ''
}

// ============= Init =============
async function init() {
  const loaded = await loadFromJsonFile()
  if (!loaded) {
    try { projectNames = JSON.parse(localStorage.getItem('todo_project_names')) || [] } catch (e) { projectNames = [] }
    try { items = JSON.parse(localStorage.getItem('todo_release_data')) || [] } catch (e) { items = [] }
    loadBranchCache()
    loadLaunchBranch()
  }
  document.getElementById('pmLaunchBranch').value = launchBranch
  updateProjectDatalist()
  renderProjectMgr()
  render()
  autoFetchBranches()
}

function updateProjectDatalist() {
  // 已改用自定义下拉框，此函数保留但不执行
}

// 自定义项目下拉框
function setupProjectDropdown(input) {
  let dropdown = null
  let selectedIndex = -1
  let isUserInput = false // 标记是否为用户输入

  const showDropdown = (filter = false) => {
    if (dropdown) return
    dropdown = document.createElement('div')
    dropdown.className = 'project-dropdown'
    
    const rect = input.getBoundingClientRect()
    dropdown.style.left = rect.left + 'px'
    dropdown.style.top = (rect.bottom + 2) + 'px'
    dropdown.style.width = rect.width + 'px'
    
    // 如果是用户输入则过滤，否则显示全部
    const filtered = filter 
      ? projectNames.filter(p => p.name.toLowerCase().includes(input.value.toLowerCase()))
      : projectNames
    
    if (filtered.length === 0) {
      dropdown.innerHTML = '<div class="project-dropdown-item" style="color:var(--text-muted)">无匹配项目</div>'
    } else {
      filtered.forEach((p, i) => {
        const item = document.createElement('div')
        item.className = 'project-dropdown-item'
        if (p.name === input.value) item.classList.add('selected')
        item.textContent = p.name
        item.onclick = () => {
          input.value = p.name
          isUserInput = false // 选择后重置标记
          hideDropdown()
          input.focus()
        }
        dropdown.appendChild(item)
      })
    }
    
    document.body.appendChild(dropdown)
  }

  const hideDropdown = () => {
    if (dropdown) {
      dropdown.remove()
      dropdown = null
    }
    selectedIndex = -1
  }

  const updateDropdown = () => {
    if (!dropdown) return
    const filtered = projectNames.filter(p => 
      p.name.toLowerCase().includes(input.value.toLowerCase())
    )
    
    dropdown.innerHTML = ''
    if (filtered.length === 0) {
      dropdown.innerHTML = '<div class="project-dropdown-item" style="color:var(--text-muted)">无匹配项目</div>'
    } else {
      filtered.forEach((p, i) => {
        const item = document.createElement('div')
        item.className = 'project-dropdown-item'
        if (i === selectedIndex) item.classList.add('selected')
        item.textContent = p.name
        item.onclick = () => {
          input.value = p.name
          isUserInput = false
          hideDropdown()
          input.focus()
        }
        dropdown.appendChild(item)
      })
    }
  }

  // focus时显示全部项目（不过滤）
  input.addEventListener('focus', () => {
    // 先关闭已有的下拉框（防止 blur 的 setTimeout 还没执行完）
    if (dropdown) {
      dropdown.remove()
      dropdown = null
    }
    isUserInput = false
    showDropdown(false)
  })
  
  // click时也显示下拉框（解决 focus 后再次点击不触发 focus 事件的问题）
  input.addEventListener('click', () => {
    if (!dropdown) {
      isUserInput = false
      showDropdown(false)
    }
  })
  
  // 用户输入时才过滤
  input.addEventListener('input', () => {
    isUserInput = true
    selectedIndex = -1
    if (!dropdown) showDropdown(true)
    else {
      const rect = input.getBoundingClientRect()
      dropdown.style.left = rect.left + 'px'
      dropdown.style.top = (rect.bottom + 2) + 'px'
      dropdown.style.width = rect.width + 'px'
    }
    updateDropdown()
  })
  
  input.addEventListener('keydown', (e) => {
    if (!dropdown) return
    const items = dropdown.querySelectorAll('.project-dropdown-item')
    const count = items.length
    
    if (e.key === 'ArrowDown') {
      e.preventDefault()
      selectedIndex = Math.min(selectedIndex + 1, count - 1)
      updateDropdown()
    } else if (e.key === 'ArrowUp') {
      e.preventDefault()
      selectedIndex = Math.max(selectedIndex - 1, 0)
      updateDropdown()
    } else if (e.key === 'Enter' && selectedIndex >= 0) {
      e.preventDefault()
      const filtered = isUserInput 
        ? projectNames.filter(p => p.name.toLowerCase().includes(input.value.toLowerCase()))
        : projectNames
      if (filtered[selectedIndex]) {
        input.value = filtered[selectedIndex].name
        isUserInput = false
        hideDropdown()
      }
    } else if (e.key === 'Escape') {
      hideDropdown()
    }
  })

  input.addEventListener('blur', () => {
    setTimeout(hideDropdown, 150)
  })
}

function getProjectInfo(name) { return projectNames.find(p => p.name === name) }

function buildMrUrl(mrBase, branchName, targetBranch) {
  if (!mrBase) return ''
  const target = targetBranch || launchBranch || 'master_launched'
  let url = mrBase.replace(/\/+$/, '')
  // 如果已经是 /merge_requests/new 结尾，直接加参数
  if (url.includes('/merge_requests/new')) {
    url = url.replace(/\?.*$/, '')
  } else if (url.includes('/merge_requests')) {
    url = url.replace(/\/merge_requests.*$/, '/merge_requests/new')
  } else {
    url += '/-/merge_requests/new'
  }
  return url + '?merge_request[source_branch]=' + encodeURIComponent(branchName) + '&merge_request[target_branch]=' + encodeURIComponent(target)
}

function buildBranchUrl(mrBase, refBranch) {
  if (!mrBase) return ''
  const ref = refBranch || 'master'
  const now = new Date()
  const mm = String(now.getMonth() + 1).padStart(2, '0')
  const dd = String(now.getDate()).padStart(2, '0')
  const branchName = 'master_' + mm + dd
  let url = mrBase.replace(/\/+$/, '')
  if (url.includes('/merge_requests')) {
    url = url.replace(/\/merge_requests.*$/, '/branches/new')
  } else {
    url += '/-/branches/new'
  }
  return url + '?ref=' + encodeURIComponent(ref) + '&branch_name=' + encodeURIComponent(branchName)
}

function getProjectColorIndex(name) {
  let hash = 0
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash)
  }
  return Math.abs(hash) % 30
}

// ============= Search =============
function onSearch() {
  const inp = document.getElementById('searchInput')
  const clearBtn = document.getElementById('searchClear')
  searchQuery = inp.value.trim().toLowerCase()
  clearBtn.style.display = searchQuery ? 'block' : 'none'
  render()
}

function clearSearch() {
  document.getElementById('searchInput').value = ''
  searchQuery = ''
  document.getElementById('searchClear').style.display = 'none'
  render()
}

function filterItems(arr) {
  if (!searchQuery) return arr
  return arr.filter(i => {
    const nameMatch = i.name.toLowerCase().includes(searchQuery)
    const linkMatch = i.link && i.link.toLowerCase().includes(searchQuery)
    // 搜索项目分支名
    const branchMatch = (i.projects && i.projects.some(p => p.branch && p.branch.toLowerCase().includes(searchQuery)))
    // 搜索一同发版分支名
    const syncBranchMatch = (i.syncBranches && i.syncBranches.some(sb => sb.branch && sb.branch.toLowerCase().includes(searchQuery)))
    return nameMatch || linkMatch || branchMatch || syncBranchMatch
  })
}

// ============= Toast =============
let toastTimer
function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => el.classList.remove('show'), 1600)
}

// ============= Project Manager =============
function toggleProjectMgr() {
  const body = document.getElementById('pmBody')
  const arrow = document.getElementById('pmArrow')
  if (body.classList.contains('expanded')) {
    body.classList.remove('expanded'); arrow.classList.remove('open')
  } else {
    body.classList.add('expanded'); arrow.classList.add('open')
  }
}

let editingProjectIdx = -1

function renderProjectMgr() {
  if (editingProjectIdx >= 0 && editingProjectIdx < projectNames.length) {
    const p = projectNames[editingProjectIdx]
    document.getElementById('pmTagList').innerHTML = `
      <div class="edit-row">
        <input id="pmEditName" value="${escHtml(p.name)}" placeholder="项目名称" style="width:150px">
        <input id="pmEditMr" value="${escHtml(p.mr || '')}" placeholder="MR 地址（可选）" style="width:260px">
        <input id="pmEditPath" value="${escHtml(p.localPath || '')}" placeholder="本地路径（可选）" style="width:200px">
        <button class="btn btn-success btn-sm" onclick="saveProjectEdit()" title="保存项目修改">保存</button>
        <button class="btn btn-outline btn-sm" onclick="cancelProjectEdit()" title="取消编辑">取消</button>
      </div>
    `
  } else {
    document.getElementById('pmTagList').innerHTML = projectNames
      .map((p, i) => {
        const colorIdx = getProjectColorIndex(p.name)
        return `<span class="tag-item"><span class="proj-name project-tag${p.mr ? ' has-mr' : ''}" data-color="${colorIdx}">${escHtml(p.name)}</span>${p.mr ? `<a class="mr-link" href="${escHtml(p.mr)}" target="_blank" title="打开 MR 页面">MR</a><a class="mr-link" href="${buildBranchUrl(p.mr, 'master').replace(/'/g, "\\'")}" target="_blank" title="新建分支（基于 master）" style="color:var(--cyan)">NB</a>` : ''}${p.localPath ? `<span class="path-tag" title="${escHtml(p.localPath)}">📁</span>` : ''}<button class="edit-btn" title="编辑项目" onclick="editProject(${i})">✏️</button><button class="del" title="删除项目" onclick="removeProjectName(${i})">×</button></span>`
      }).join('')
  }
}

function editProject(i) {
  editingProjectIdx = i
  renderProjectMgr()
}

function cancelProjectEdit() {
  editingProjectIdx = -1
  renderProjectMgr()
}

function saveProjectEdit() {
  const nameInput = document.getElementById('pmEditName')
  const mrInput = document.getElementById('pmEditMr')
  const pathInput = document.getElementById('pmEditPath')
  const newName = nameInput.value.trim()
  const newMr = mrInput.value.trim()
  const newPath = pathInput.value.trim()
  if (!newName) { nameInput.focus(); return }
  const oldName = projectNames[editingProjectIdx].name
  if (newName !== oldName && projectNames.some(p => p.name === newName)) {
    toast('项目名称已存在'); nameInput.focus(); return
  }
  projectNames[editingProjectIdx] = { name: newName, mr: newMr || '', localPath: newPath || '' }
  editingProjectIdx = -1
  updateProjectDatalist(); renderProjectMgr(); saveToLocalStorage()
  toast('已更新 ' + newName)
}

function addProjectName() {
  const input = document.getElementById('pmNewName')
  const mrInput = document.getElementById('pmNewMr')
  const pathInput = document.getElementById('pmNewPath')
  const name = input.value.trim()
  const mr = mrInput.value.trim()
  const localPath = pathInput.value.trim()
  if (!name) return
  if (projectNames.some(p => p.name === name)) { input.value = ''; toast('项目已存在'); return }
  projectNames.push({ name, mr: mr || '', localPath: localPath || '' })
  input.value = ''; mrInput.value = ''; pathInput.value = ''
  updateProjectDatalist(); renderProjectMgr(); saveToLocalStorage()
  toast('已添加 ' + name)
}

function removeProjectName(i) {
  const name = projectNames[i].name
  projectNames.splice(i, 1)
  if (editingProjectIdx === i) editingProjectIdx = -1
  else if (editingProjectIdx > i) editingProjectIdx--
  updateProjectDatalist(); renderProjectMgr(); saveToLocalStorage()
  toast('已移除 ' + name)
}

// ============= Utilities =============
function escHtml(str) {
  if (!str) return ''
  const div = document.createElement('div')
  div.textContent = str
  return div.innerHTML
}

function truncateBranch(name, maxLen) {
  if (!name || name.length <= maxLen) return name
  return name.substring(0, maxLen) + '...'
}

function escAttr(str) {
  if (!str) return ''
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
}

function truncateUrl(url) {
  if (!url) return ''
  return url.length > 32 ? url.substring(0, 32) + '...' : url
}

function formatReleaseTime(date) {
  const y = date.getFullYear()
  const m = String(date.getMonth() + 1).padStart(2, '0')
  const d = String(date.getDate()).padStart(2, '0')
  const h = String(date.getHours()).padStart(2, '0')
  const min = String(date.getMinutes()).padStart(2, '0')
  const s = String(date.getSeconds()).padStart(2, '0')
  return `${y}-${m}-${d} ${h}:${min}:${s}`
}

function copyText(text) {
  if (!text) return Promise.resolve()
  return navigator.clipboard.writeText(text)
    .then(() => toast('\u2713 ' + text))
    .catch(() => {
      const ta = document.createElement('textarea')
      ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px'
      document.body.appendChild(ta); ta.select()
      document.execCommand('copy'); document.body.removeChild(ta)
      toast('\u2713 ' + text)
    })
}

// ============= Render =============
function render() {
  const pending = filterItems(items.filter(i => i.status === 'pending' || i.status === 'new'))
  const releasing = filterItems(items.filter(i => i.status === 'releasing'))
  const released = filterItems(items.filter(i => i.status === 'released'))

  document.getElementById('pendingCount').textContent = pending.length || '0'
  document.getElementById('releasingCount').textContent = releasing.length || '0'
  document.getElementById('releasedCount').textContent = released.length || '0'

  // 默认展开待发版
  const pendingBody = document.getElementById('pendingBody')
  const pendingArrow = document.getElementById('pendingArrow')
  if (!pendingBody.classList.contains('expanded')) {
    pendingBody.classList.add('expanded')
    pendingArrow.classList.add('open')
  }

  // 发版中有数据时默认展开
  const releasingBody = document.getElementById('releasingBody')
  const releasingArrow = document.getElementById('releasingArrow')
  if (releasing.length > 0 && !releasingBody.classList.contains('expanded')) {
    releasingBody.classList.add('expanded')
    releasingArrow.classList.add('open')
  }

  const pTbody = document.getElementById('pendingTbody')
  const rlTbody = document.getElementById('releasingTbody')
  const rTbody = document.getElementById('releasedTbody')
  pTbody.innerHTML = ''; rlTbody.innerHTML = ''; rTbody.innerHTML = ''

  addingItems.forEach(ai => {
    const tr = createEditRow(ai, true)
    tr.classList.add('edit-row')
    pTbody.appendChild(tr)
  })

  const pEmpty = document.getElementById('pendingEmpty')
  if (pending.length === 0 && addingItems.length === 0) {
    pEmpty.style.display = 'block'
  } else {
    pEmpty.style.display = 'none'
    pending.forEach((item) => {
      const isNew = item._justAdded
      if (isNew) delete item._justAdded
      if (editingIds[item.id]) pTbody.appendChild(createEditRow(item, false))
      else pTbody.appendChild(createDisplayRow(item, isNew, (isNew || item.status === 'new') ? 'test' : 'uat'))
    })
  }

  // 发版中
  const rlEmpty = document.getElementById('releasingEmpty')
  if (releasing.length === 0) {
    rlEmpty.style.display = 'block'
  } else {
    rlEmpty.style.display = 'none'
    releasing.forEach(item => {
      if (editingIds[item.id]) rlTbody.appendChild(createEditRow(item, false))
      else rlTbody.appendChild(createDisplayRow(item, false, launchBranch || null))
    })
  }

  // 已发版
  const rEmpty = document.getElementById('releasedEmpty')
  if (released.length === 0) {
    rEmpty.style.display = 'block'
  } else {
    rEmpty.style.display = 'none'
    released.forEach(item => {
      if (editingIds[item.id]) rTbody.appendChild(createEditRow(item, false))
      else rTbody.appendChild(createDisplayRow(item, false))
    })
  }

  renderReleasingSummary(releasing)
  document.getElementById('releaseAllDoneBtn').style.display = releasing.length > 0 ? '' : 'none'
  updateTotalCount()
}

// 发版中标题旁总结项目类型，点击跳转 MR（源: 上线分支, 目标: master）
function renderReleasingSummary(releasingItems) {
  const summary = document.getElementById('releasingProjectSummary')
  if (!summary) return
  const projectSet = new Map()
  releasingItems.forEach(item => {
    if (item.projects) item.projects.forEach(p => {
      if (p.name && !projectSet.has(p.name)) {
        const info = getProjectInfo(p.name)
        projectSet.set(p.name, info && info.mr ? info.mr : null)
      }
    })
    if (item.syncBranches) item.syncBranches.forEach(sb => {
      if (sb.project && !projectSet.has(sb.project)) {
        const info = getProjectInfo(sb.project)
        projectSet.set(sb.project, info && info.mr ? info.mr : null)
      }
    })
  })
  if (projectSet.size === 0) { summary.innerHTML = ''; return }
  summary.innerHTML = '<span style="color:var(--text-muted)">发版项目：</span>' +
    [...projectSet.entries()].map(([name, mr]) => {
      const colorIdx = getProjectColorIndex(name)
      let html = ''
      if (mr) {
        const srcBranch = launchBranch || findItemTargetBranch(releasingItems, name) || 'master_launched'
        const mrUrl = buildMrUrl(mr, srcBranch, 'master')
        html += `<span class="project-tag has-mr" data-color="${colorIdx}" style="cursor:pointer;font-size:11px" onclick="window.open('${mrUrl.replace(/'/g, "\\'")}','_blank')" title="创建发版 MR → master">${escHtml(name)}</span>`
      } else {
        html += `<span class="project-tag" data-color="${colorIdx}" style="font-size:11px">${escHtml(name)}</span>`
      }
      return html
    }).join('')
}

function findItemTargetBranch(items, projectName) {
  for (const item of items) {
    if (item.targetBranches && item.targetBranches[projectName]) {
      return item.targetBranches[projectName]
    }
  }
  return null
}

function updateTotalCount() {
  document.getElementById('totalCount').textContent = '共 ' + items.length + ' 条'
}

// ============= Collect =============
function collectEditRowData(itemId) {
  const pairs = document.getElementById('pairs-' + itemId)
  const tr = pairs ? pairs.closest('tr') : document.querySelector('tr.edit-row')
  if (!tr) return null

  const name = (tr.querySelector('[data-field=name]')?.value || '').trim()
  const link = (tr.querySelector('[data-field=link]')?.value || '').trim()

  const projects = []
  const pc = document.getElementById('pairs-' + itemId)
  if (pc) pc.querySelectorAll('.pair-row').forEach(row => {
    const n = (row.querySelector('[data-role=projectName]')?.value || '').trim()
    const b = (row.querySelector('[data-role=projectBranch]')?.value || '').trim()
    if (n) projects.push({ name: n, branch: b })
  })

  const syncBranches = []
  tr.querySelectorAll('[data-role=syncProjectName]').forEach(projInp => {
    const row = projInp.closest('.pair-row')
    const branchInp = row ? row.querySelector('[data-role=syncBranchName]') : null
    const p = projInp.value.trim()
    const b = branchInp ? branchInp.value.trim() : ''
    if (b) syncBranches.push({ project: p, branch: b })
  })

  return { name, link, projects, syncBranches }
}

// ============= Actions =============
function handleAction(e, itemId) {
  const btn = e.target.closest('button')
  if (!btn) return
  const action = btn.dataset.action
  e.stopPropagation()

  switch (action) {
    case 'edit': {
      const item = items.find(i => i.id === itemId)
      if (item && (item.status === 'releasing' || item.status === 'released')) { toast('发版中/已发版不支持编辑'); break }
      editingIds[itemId] = true; render(); break
    }
    case 'save': {
      const data = collectEditRowData(itemId)
      if (!data || !data.name) { toast('请输入需求名称'); return }
      if (itemId.startsWith('__add_')) {
        const newItem = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          name: data.name, link: data.link, status: 'new',
          projects: data.projects, syncBranches: data.syncBranches,
          _justAdded: true
        }
        items.unshift(newItem)
        addingItems = addingItems.filter(a => a.id !== itemId)
      } else {
        const item = items.find(i => i.id === itemId)
        if (item) Object.assign(item, { name: data.name, link: data.link, projects: data.projects, syncBranches: data.syncBranches })
        delete editingIds[itemId]
        toast('已保存')
      }
      saveToLocalStorage(); render(); break
    }
    case 'cancel':
      if (itemId.startsWith('__add_')) addingItems = addingItems.filter(a => a.id !== itemId)
      else delete editingIds[itemId]
      render(); break
    case 'release': {
      const item = items.find(i => i.id === itemId)
      if (!item) break
      // 检查是否已设置上线分支
      if (!launchBranch) {
        pendingReleaseItemId = itemId
        if (showLaunchBranchPrompt(item)) break // 弹窗已显示，等待填写
        // 所有项目已有上线分支，直接继承
        item.targetBranches = getReleasedProjectTargets()
      }
      if (item) {
        item.status = 'releasing'
        item.releaseTime = formatReleaseTime(new Date())
        toast('\u2713 已开始发版：' + item.name)
      }
      saveToLocalStorage(); render(); break
    }
    case 'releaseToReleased': {
      const item = items.find(i => i.id === itemId)
      if (item) {
        item.status = 'released'
        item.releaseTime = formatReleaseTime(new Date())
        toast('\u2713 已发版：' + item.name)
      }
      saveToLocalStorage(); render(); break
    }
    case 'markPending': {
      const item = items.find(i => i.id === itemId)
      if (item) { item.status = 'pending'; toast('已设为待发版：' + item.name) }
      saveToLocalStorage(); render(); break
    }
    case 'revertNew': {
      const item = items.find(i => i.id === itemId)
      if (item) { item.status = 'new'; toast('已回退新建：' + item.name) }
      saveToLocalStorage(); render(); break
    }
    case 'unrelease': {
      const item = items.find(i => i.id === itemId)
      if (item) { item.status = 'pending'; delete item.releaseTime; toast('已恢复待发版：' + item.name) }
      saveToLocalStorage(); render(); break
    }
    case 'delete': showConfirm(itemId); break
  }
}

function startAdding() {
  addingItems.push({
    id: '__add_' + addingCounter++, name: '', link: '',
    status: 'new', projects: [], syncBranches: []
  })
  render()
}

function releaseAll() {
  const pending = items.filter(i => i.status === 'pending')
  if (pending.length === 0) { toast('没有待发版的需求'); return }
  if (!launchBranch) {
    pendingReleaseItemId = '__all__'
    if (showBatchLaunchPrompt(pending)) return // 弹窗已显示，等待填写
    // 所有项目已有上线分支，直接继承
  }
  const existingTargets = getReleasedProjectTargets()
  const releaseTime = formatReleaseTime(new Date())
  pending.forEach(i => { i.status = 'releasing'; i.releaseTime = releaseTime; i.targetBranches = existingTargets })
  saveToLocalStorage(); render()
  toast('已全部开始发版（' + pending.length + ' 条）')
}

function releaseAllToDone() {
  const releasing = items.filter(i => i.status === 'releasing')
  if (releasing.length === 0) { toast('没有发版中的需求'); return }
  const releaseTime = formatReleaseTime(new Date())
  releasing.forEach(i => { i.status = 'released'; i.releaseTime = releaseTime })
  saveToLocalStorage(); render()
  toast('已全部完成发版（' + releasing.length + ' 条）')
}

// ============= Confirm =============
let pendingDeleteId = null
let pendingReleaseItemId = null

// 保存上线分支名（全局）
function saveLaunchBranchName() {
  const val = document.getElementById('pmLaunchBranch').value.trim()
  launchBranch = val
  saveLaunchBranch()
  render()
  if (val) toast('上线分支已设为：' + launchBranch)
  else toast('已清除上线分支')
}

// 获取发版中已有目标分支的项目集合
function getReleasedProjectTargets() {
  const targets = {}
  const released = items.filter(i => i.status === 'releasing')
  released.forEach(item => {
    if (item.targetBranches) {
      Object.entries(item.targetBranches).forEach(([k, v]) => { targets[k] = v })
    }
  })
  return targets
}

// 弹出批量发版项目上线分支填写弹窗
function showBatchLaunchPrompt(pendingItems) {
  const msg = document.getElementById('launchBranchMsg')
  const list = document.getElementById('launchBranchProjectList')
  msg.textContent = '批量发版（共 ' + pendingItems.length + ' 条需求）'

  const existingTargets = getReleasedProjectTargets()

  const projects = []
  const seen = new Set()
  pendingItems.forEach(item => {
    if (item.projects) item.projects.forEach(p => {
      if (p.name && !seen.has(p.name) && !existingTargets[p.name]) { seen.add(p.name); projects.push(p.name) }
    })
    if (item.syncBranches) item.syncBranches.forEach(sb => {
      if (sb.project && !seen.has(sb.project) && !existingTargets[sb.project]) { seen.add(sb.project); projects.push(sb.project) }
    })
  })

  if (projects.length === 0) return false // 全部已有，无需弹窗

  renderLaunchProjectList(list, projects)
  document.getElementById('launchBranchOverlay').style.display = 'flex'
  setTimeout(() => {
    const first = list.querySelector('.launch-target-input')
    if (first) first.focus()
  }, 100)
  return true
}

// 弹出需求项目上线分支填写弹窗
function showLaunchBranchPrompt(item) {
  const msg = document.getElementById('launchBranchMsg')
  const list = document.getElementById('launchBranchProjectList')
  msg.textContent = '需求：' + item.name

  const existingTargets = getReleasedProjectTargets()

  const projects = []
  const seen = new Set()
  if (item.projects) item.projects.forEach(p => {
    if (p.name && !seen.has(p.name) && !existingTargets[p.name]) { seen.add(p.name); projects.push(p.name) }
  })
  if (item.syncBranches) item.syncBranches.forEach(sb => {
    if (sb.project && !seen.has(sb.project) && !existingTargets[sb.project]) { seen.add(sb.project); projects.push(sb.project) }
  })
  if (projects.length === 0) return false // 全部已有，无需弹窗

  renderLaunchProjectList(list, projects)
  document.getElementById('launchBranchOverlay').style.display = 'flex'
  setTimeout(() => {
    const first = list.querySelector('.launch-target-input')
    if (first) first.focus()
  }, 100)
  return true
}

function renderLaunchProjectList(list, projects) {
  list.innerHTML = projects.map((name) => {
    const colorIdx = getProjectColorIndex(name)
    const info = getProjectInfo(name)
    const defaultTarget = ''
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border-light)">
      <span class="project-tag" data-color="${colorIdx}" style="font-size:11px;flex-shrink:0;min-width:80px;text-align:center">${escHtml(name)}</span>
      <span style="font-size:11px;color:var(--text-muted);flex-shrink:0">→</span>
      <input class="launch-target-input" data-project="${escHtml(name)}" placeholder="目标分支" value="${escHtml(defaultTarget)}" style="flex:1;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px" onkeydown="if(event.key==='Enter')confirmLaunchBranch()" />
    </div>`
  }).join('')
}

// 从发版弹窗确认
function confirmLaunchBranch() {
  const inputs = document.querySelectorAll('#launchBranchProjectList .launch-target-input')
  const targetBranches = {}
  let allFilled = true
  inputs.forEach(inp => {
    const val = inp.value.trim()
    const project = inp.dataset.project
    if (!val) { allFilled = false; inp.style.borderColor = 'var(--danger)'; return }
    inp.style.borderColor = 'var(--border)'
    targetBranches[project] = val
  })
  if (!allFilled) { toast('请填写所有项目的目标分支'); return }

  // 合并其他发版中已填写过的目标分支（弹窗中跳过的项目）
  const existingTargets = getReleasedProjectTargets()
  const mergedTargets = { ...existingTargets, ...targetBranches }

  document.getElementById('launchBranchOverlay').style.display = 'none'

  if (pendingReleaseItemId === '__all__') {
    const pending = items.filter(i => i.status === 'pending')
    const releaseTime = formatReleaseTime(new Date())
    pending.forEach(i => { i.status = 'releasing'; i.releaseTime = releaseTime; i.targetBranches = mergedTargets })
    saveToLocalStorage(); render()
    toast('已全部开始发版（' + pending.length + ' 条）')
  } else if (pendingReleaseItemId) {
    const item = items.find(i => i.id === pendingReleaseItemId)
    if (item) {
      item.targetBranches = mergedTargets
      item.status = 'releasing'
      item.releaseTime = formatReleaseTime(new Date())
      toast('\u2713 已开始发版：' + item.name)
    }
    saveToLocalStorage(); render()
  }
  pendingReleaseItemId = null
}

function closeLaunchBranchPrompt() {
  document.getElementById('launchBranchOverlay').style.display = 'none'
  pendingReleaseItemId = null
}

function showConfirm(id) {
  pendingDeleteId = id
  const item = items.find(i => i.id === id)
  document.getElementById('confirmMsg').textContent = item ? '需求：' + item.name : ''
  document.getElementById('confirmOverlay').style.display = 'flex'
}

function closeConfirm() {
  pendingDeleteId = null
  document.getElementById('confirmOverlay').style.display = 'none'
}

document.getElementById('confirmOkBtn').onclick = () => {
  if (!pendingDeleteId) return
  const item = items.find(i => i.id === pendingDeleteId)
  const name = item ? item.name : ''
  items = items.filter(i => i.id !== pendingDeleteId)
  saveToLocalStorage(); closeConfirm(); render()
  toast('已删除：' + name)
}

document.getElementById('confirmOverlay').onclick = e => {
  if (e.target === document.getElementById('confirmOverlay')) closeConfirm()
}

document.getElementById('launchBranchOverlay').onclick = e => {
  if (e.target === document.getElementById('launchBranchOverlay')) closeLaunchBranchPrompt()
}

// ============= Collapse =============
function togglePending() {
  const body = document.getElementById('pendingBody')
  const arrow = document.getElementById('pendingArrow')
  if (body.classList.contains('expanded')) {
    body.classList.remove('expanded'); arrow.classList.remove('open')
  } else {
    body.classList.add('expanded'); arrow.classList.add('open')
  }
}

function toggleReleasing() {
  const body = document.getElementById('releasingBody')
  const arrow = document.getElementById('releasingArrow')
  if (body.classList.contains('expanded')) {
    body.classList.remove('expanded'); arrow.classList.remove('open')
  } else {
    body.classList.add('expanded'); arrow.classList.add('open')
  }
}

function toggleReleased() {
  const body = document.getElementById('releasedBody')
  const arrow = document.getElementById('releasedArrow')
  if (body.classList.contains('expanded')) {
    body.classList.remove('expanded'); arrow.classList.remove('open')
  } else {
    body.classList.add('expanded'); arrow.classList.add('open')
  }
}

// ============= Keyboard =============
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); startAdding() }
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault()
    document.getElementById('searchInput').focus()
  }
  if (e.key === 'Escape') {
    if (document.getElementById('confirmOverlay').style.display === 'flex') closeConfirm()
    if (document.getElementById('launchBranchOverlay').style.display === 'flex') closeLaunchBranchPrompt()
    if (searchQuery) clearSearch()
  }
})

// ============= Daily reminder =============
function getTodayStr() {
  const d = new Date()
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0')
}

function checkDailyReminder() {
  const lastDate = localStorage.getItem('todo_last_remind_date')
  if (lastDate !== getTodayStr()) {
    document.getElementById('reminderOverlay').classList.add('show')
  }
}

function dismissReminder() {
  document.getElementById('reminderOverlay').classList.remove('show')
  localStorage.setItem('todo_last_remind_date', getTodayStr())
}

function exportAndDismiss() {
  exportToFile()
  dismissReminder()
}

// 自动后台获取分支（每天最多一次）
async function autoFetchBranches() {
  const lastFetchDate = localStorage.getItem('todo_last_branch_fetch_date')
  if (lastFetchDate === getTodayStr()) return

  const projectsWithPath = projectNames.filter(p => p.localPath)
  if (projectsWithPath.length === 0) return

  // 检查服务器是否运行
  try {
    const resp = await fetch('http://localhost:' + API_PORT + '/api/git-user')
    if (!resp.ok) return
  } catch (e) { return }

  // 获取 git 用户名
  let gitUser = null
  try {
    const userRes = await fetch('http://localhost:' + API_PORT + '/api/git-user')
    const userData = await userRes.json()
    gitUser = userData.user
  } catch (e) {}

  // 显示进度条
  const progressEl = document.getElementById('branchProgress')
  const progressBar = document.getElementById('branchProgressBar')
  const progressText = document.getElementById('branchProgressText')
  const total = projectsWithPath.length
  progressEl.style.display = 'block'
  progressBar.style.width = '0%'
  progressText.textContent = `0/${total}`

  let done = 0
  for (const project of projectsWithPath) {
    try {
      const url = `http://localhost:${API_PORT}/api/branches?path=${encodeURIComponent(project.localPath)}&user=${encodeURIComponent(gitUser || '')}`
      const res = await fetch(url)
      const data = await res.json()
      if (!data.error && data.branches) {
        branchesCache[project.name] = { branches: data.branches, timestamp: Date.now() }
      }
    } catch (e) {}
    done++
    progressBar.style.width = `${(done / total) * 100}%`
    progressText.textContent = `${done}/${total}`
  }

  // 记录已获取日期，隐藏进度条
  localStorage.setItem('todo_last_branch_fetch_date', getTodayStr())
  saveBranchCache()
  setTimeout(() => { progressEl.style.display = 'none' }, 800)
}

// 在表格行中点击按钮——打开单个项目的分支弹窗，点击填充
async function openBranchLookup(branchInput, projInput) {
  const projectName = (projInput ? projInput.value : '').trim()
  if (!projectName) { toast('请先输入项目名'); return }

  const project = projectNames.find(p => p.name === projectName)
  if (!project || !project.localPath) { toast('该项目未配置本地路径'); return }

  // 先检查缓存
  const cached = branchesCache[projectName]
  if (cached && cached.branches && cached.branches.length > 0) {
    const filtered = cached.branches.filter(b => b.branch && b.branch !== 'origin' && !b.branch.startsWith('origin/'))
    showBranchLookupPopup(branchInput, project, filtered)
    return
  }

  // 检查服务器
  try {
    const resp = await fetch('http://localhost:' + API_PORT + '/api/git-user')
    if (!resp.ok) throw new Error('服务器未响应')
  } catch (e) {
    toast('请先启动服务器: node server.js')
    return
  }

  toast('正在获取分支...')

  let gitUser = null
  try {
    const userRes = await fetch('http://localhost:' + API_PORT + '/api/git-user')
    const userData = await userRes.json()
    gitUser = userData.user
  } catch (e) {}

  let branches = []
  try {
    const url = `http://localhost:${API_PORT}/api/branches?path=${encodeURIComponent(project.localPath)}&user=${encodeURIComponent(gitUser || '')}`
    const res = await fetch(url)
    const data = await res.json()
    if (data.branches) {
      branches = data.branches
      branchesCache[projectName] = { branches: data.branches, timestamp: Date.now() }
      saveBranchCache()
    }
  } catch (e) {}

  showBranchLookupPopup(branchInput, project, branches)
}

// 收集所有已发布需求中的分支（项目名→分支名集合）
function getReleasedBranchSet() {
  const released = items.filter(i => i.status === 'released')
  const set = new Set()
  released.forEach(item => {
    if (item.projects) item.projects.forEach(p => {
      if (p.name && p.branch) set.add(p.name + '\x00' + p.branch.trim())
    })
    if (item.syncBranches) item.syncBranches.forEach(sb => {
      if (sb.project && sb.branch) set.add(sb.project + '\x00' + sb.branch.trim())
    })
  })
  return set
}

// 渲染分支查找弹窗
function showBranchLookupPopup(branchInput, project, branches) {
  const overlay = document.createElement('div')
  overlay.className = 'branch-overlay'
  overlay._targetInput = branchInput
  overlay._branches = branches
  overlay._project = project
  const releasedSet = getReleasedBranchSet()
  const releasedClass = (b) => releasedSet.has(project.name + '\x00' + (b.branch || '').trim()) ? ' released-branch' : ''
  overlay.innerHTML = `
    <div class="branch-modal" style="max-width:500px">
      <div class="branch-header">
        <h3>${escHtml(project.name)} 分支列表</h3>
        <input class="header-search" placeholder="搜索分支..." oninput="filterBranchPopup(this)">
        <button class="btn-close" onclick="this.closest('.branch-overlay').remove()" title="关闭">×</button>
      </div>
      <div class="branch-content" id="branchPopupContent">
        <div class="branch-project">
          <div class="branch-project-name">${escHtml(project.name)} <span class="branch-count">${branches.length}个分支</span></div>
          <div class="branch-list" id="branchPopupList">
            ${branches.length > 0 ? branches.map(b => `
              <div class="branch-item${releasedClass(b)}" style="cursor:pointer" onclick="fillBranchToInput('${escAttr(b.branch)}', this.closest('.branch-overlay'))">
                <span class="branch-name">${escHtml(b.branch)}</span>
                <span class="branch-date">${b.date}</span>
                <span class="branch-author">${escHtml(b.author)}</span>
              </div>
            `).join('') : '<div class="branch-empty">未找到分支</div>'}
          </div>
        </div>
      </div>
      <div class="branch-footer">
        <button class="btn btn-outline btn-sm" onclick="this.closest('.branch-overlay').remove()" title="关闭弹窗">关闭</button>
      </div>
    </div>
  `
  document.body.appendChild(overlay)
}

// 点击分支后填充到 input
function fillBranchToInput(branchName, overlay) {
  const branchClean = branchName.replace(/\s/g, '')
  if (overlay && overlay._targetInput) {
    overlay._targetInput.value = branchClean
    overlay._targetInput.title = branchClean
    toast('已填充: ' + branchClean)
  }
  overlay.remove()
}

// 获取所有项目的分支
async function fetchAllBranches() {
  const projectsWithPath = projectNames.filter(p => p.localPath)
  if (projectsWithPath.length === 0) {
    toast('没有配置本地路径的项目')
    return
  }

  // 检查服务器是否运行
  try {
    const response = await fetch('http://localhost:' + API_PORT + '/api/git-user')
    if (!response.ok) throw new Error('服务器未响应')
  } catch (e) {
    toast('请先启动服务器: node server.js')
    return
  }

  // 获取git用户名
  let gitUser = null
  try {
    const userRes = await fetch('http://localhost:' + API_PORT + '/api/git-user')
    const userData = await userRes.json()
    gitUser = userData.user
  } catch (e) {}

  toast('正在获取分支...')

  // 创建结果弹窗
  const overlay = document.createElement('div')
  overlay.className = 'branch-overlay'
  overlay.innerHTML = `
    <div class="branch-modal">
      <div class="branch-header">
        <h3>分支列表</h3>
        <input class="header-search" placeholder="搜索分支..." oninput="filterBranchItems(this)" id="branchSearchMulti">
        <button class="btn-close" onclick="this.closest('.branch-overlay').remove()" title="关闭">×</button>
      </div>
      <div class="branch-content" id="branchContent">
        <div class="branch-loading">正在获取...</div>
      </div>
      <div class="branch-footer">
        <button class="btn btn-outline btn-sm" onclick="this.closest('.branch-overlay').remove()" title="关闭弹窗">关闭</button>
      </div>
    </div>
  `
  document.body.appendChild(overlay)

  const content = overlay.querySelector('#branchContent')
  let html = ''
  const releasedSet = getReleasedBranchSet()

  for (const project of projectsWithPath) {
    try {
      const url = `http://localhost:${API_PORT}/api/branches?path=${encodeURIComponent(project.localPath)}&user=${encodeURIComponent(gitUser || '')}`
      const res = await fetch(url)
      const data = await res.json()

      if (data.error) {
        html += `<div class="branch-project">
          <div class="branch-project-name">${escHtml(project.name)}</div>
          <div class="branch-error">${escHtml(data.error)}</div>
        </div>`
      } else if (data.branches && data.branches.length > 0) {
        branchesCache[project.name] = { branches: data.branches, timestamp: Date.now() }
        const pName = project.name
        html += `<div class="branch-project">
          <div class="branch-project-name">${escHtml(project.name)} <span class="branch-count">${data.branches.length}个分支</span></div>
          <div class="branch-list">
            ${data.branches.map(b => {
              const releasedClass = releasedSet.has(pName + '\x00' + (b.branch || '').trim()) ? ' released-branch' : ''
              return `<div class="branch-item${releasedClass}" style="cursor:pointer" onclick="copyBranchName('${escAttr(b.branch)}')">
                <span class="branch-name">${escHtml(b.branch)}</span>
                <span class="branch-date">${b.date}</span>
                <span class="branch-author">${escHtml(b.author)}</span>
              </div>`
            }).join('')}
          </div>
        </div>`
      } else {
        html += `<div class="branch-project">
          <div class="branch-project-name">${escHtml(project.name)}</div>
          <div class="branch-empty">未找到分支</div>
        </div>`
      }
    } catch (e) {
      html += `<div class="branch-project">
        <div class="branch-project-name">${escHtml(project.name)}</div>
        <div class="branch-error">获取失败: ${escHtml(e.message)}</div>
      </div>`
    }
  }

  saveBranchCache()
  content.innerHTML = html
}

function copyBranchName(name) {
  navigator.clipboard.writeText(name).then(() => {
    toast('已复制: ' + name)
  })
}

// 分支弹窗模糊搜索（单项目弹窗）
function filterBranchPopup(input) {
  const overlay = input.closest('.branch-overlay')
  const branches = overlay._branches || []
  const projectName = overlay._project ? overlay._project.name : ''
  const releasedSet = getReleasedBranchSet()
  const releasedClass = (b) => releasedSet.has(projectName + '\x00' + (b.branch || '').trim()) ? ' released-branch' : ''
  const keyword = input.value.trim().toLowerCase()
  const list = document.getElementById('branchPopupList')
  if (!list) return

  if (!keyword) {
    list.innerHTML = branches.map(b => `
      <div class="branch-item${releasedClass(b)}" style="cursor:pointer" onclick="fillBranchToInput('${escAttr(b.branch)}', this.closest('.branch-overlay'))">
        <span class="branch-name">${escHtml(b.branch)}</span>
        <span class="branch-date">${b.date}</span>
        <span class="branch-author">${escHtml(b.author)}</span>
      </div>
    `).join('')
  } else {
    const filtered = branches.filter(b => b.branch.toLowerCase().includes(keyword))
    list.innerHTML = filtered.length > 0
      ? filtered.map(b => `
        <div class="branch-item${releasedClass(b)}" style="cursor:pointer" onclick="fillBranchToInput('${escAttr(b.branch)}', this.closest('.branch-overlay'))">
          <span class="branch-name">${escHtml(b.branch)}</span>
          <span class="branch-date">${b.date}</span>
          <span class="branch-author">${escHtml(b.author)}</span>
        </div>
      `).join('')
      : '<div class="branch-empty">无匹配分支</div>'
  }
}

// 分支列表模糊搜索（多项目弹窗）
function filterBranchItems(input) {
  const keyword = input.value.trim().toLowerCase()
  const content = input.closest('.branch-modal').querySelector('.branch-content')
  if (!content) return
  const items = content.querySelectorAll('.branch-item')
  items.forEach(item => {
    const nameEl = item.querySelector('.branch-name')
    const name = nameEl ? nameEl.textContent.toLowerCase() : ''
    item.classList.toggle('hidden-by-search', !!keyword && !name.includes(keyword))
  })
  // 隐藏空的 branch-project
  content.querySelectorAll('.branch-project').forEach(proj => {
    const visibleItems = proj.querySelectorAll('.branch-item:not(.hidden-by-search)')
    proj.style.display = keyword && visibleItems.length === 0 ? 'none' : ''
  })
}

function selectBranch(projectName, branchName) {
  // 在所有 pair-row 中查找匹配的项目名，填充分支名
  branchName = branchName.replace(/\s/g, '') // 去除空格
  const allBranchInputs = document.querySelectorAll('[data-role="projectBranch"], [data-role="syncBranchName"]')
  let filled = 0
  allBranchInputs.forEach(inp => {
    const row = inp.closest('.pair-row')
    if (!row) return
    const role = inp.dataset.role
    const projRole = role === 'projectBranch' ? 'projectName' : 'syncProjectName'
    const projInput = row.querySelector(`[data-role="${projRole}"]`)
    if (projInput && projInput.value.trim() === projectName) {
      if (!inp.value.trim()) {
        inp.value = branchName
        filled++
      }
    }
  })
  if (filled > 0) {
    toast(`已填充 ${filled} 个分支字段: ${branchName}`)
  } else {
    toast('未找到对应项目或分支名已填写')
  }
  // 关闭弹窗
  const overlay = document.querySelector('.branch-overlay')
  if (overlay) overlay.remove()
}
